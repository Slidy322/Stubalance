<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="A comprehensive student task management app with focus mode and intelligent task prioritization" />
    <meta name="theme-color" content="#b4a0a8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stu-Balance" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <title>Stu-Balance - Student Task Manager</title>
    
    <style>
      /* Splash screen styles */
      #splash-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #b4a0a8 0%, #9d8a92 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .splash-logo {
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .splash-title {
        color: #fff;
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 10px;
        font-family: Georgia, serif;
      }
      
      .splash-subtitle {
        color: #f5e6ea;
        font-size: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
      
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-top: 30px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-logo">
        <svg width="80" height="80" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
          <rect x="45" y="50" width="102" height="92" fill="#fff" rx="8"/>
          <rect x="45" y="50" width="51" height="92" fill="#f5e6ea" rx="8"/>
          <line x1="96" y1="50" x2="96" y2="142" stroke="#b4a0a8" stroke-width="2"/>
          <path d="M 65 75 L 70 80 L 80 70" stroke="#b4a0a8" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M 65 95 L 70 100 L 80 90" stroke="#b4a0a8" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M 65 115 L 70 120 L 80 110" stroke="#b4a0a8" stroke-width="3" fill="none" stroke-linecap="round"/>
          <circle cx="130" cy="85" r="18" fill="#e8d4d9"/>
          <line x1="130" y1="85" x2="130" y2="75" stroke="#b4a0a8" stroke-width="2" stroke-linecap="round"/>
          <line x1="130" y1="85" x2="137" y2="85" stroke="#b4a0a8" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="splash-title">Stu-Balance</h1>
      <p class="splash-subtitle">Loading your tasks...</p>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash screen after app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 500);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
